    window.storage = {
      get: async function(key, shared) {
        try {
          const val = localStorage.getItem('ibuku__' + key);
          if (val === null) throw new Error('Key not found');
          return { key, value: val, shared: !!shared };
        } catch(e) { throw e; }
      },
      set: async function(key, value, shared) {
        try {
          localStorage.setItem('ibuku__' + key, value);
          return { key, value, shared: !!shared };
        } catch(e) { return null; }
      },
      delete: async function(key, shared) {
        localStorage.removeItem('ibuku__' + key);
        return { key, deleted: true, shared: !!shared };
      },
      list: async function(prefix, shared) {
        const keys = Object.keys(localStorage)
          .filter(k => k.startsWith('ibuku__' + (prefix || '')))
          .map(k => k.replace('ibuku__', ''));
        return { keys, prefix, shared: !!shared };
      }
    };

function getProjectLocation(p) {
  // If project has explicit location data, use it
  if (p.location) {
    const loc = p.location.toLowerCase();
    if (loc.includes("ubud")) return "Ubud, Bali";
    if (loc.includes("denpasar")) return "Denpasar, Bali";
    if (loc.includes("canggu")) return "Canggu, Bali";
    if (loc.includes("seminyak") || loc.includes("kerobokan") || loc.includes("umalas")) return "Seminyak area";
    if (loc.includes("sidemen")) return "Sidemen, Bali";
    if (loc.includes("amed")) return "Amed, Bali";
    if (loc.includes("nusa penida")) return "Nusa Penida";
    if (loc.includes("tampaksiring")) return "Tampaksiring, Bali";
    if (loc.includes("kintamani")) return "Kintamani, Bali";
    if (loc.includes("candidasa") || loc.includes("amlapura") || loc.includes("sengkidu") || loc.includes("manggis")) return "East Bali";
    if (loc.includes("payangan")) return "Payangan, Bali";
    if (loc.includes("gianyar") || loc.includes("batubulan")) return "_OTHER_BALI";
    if (loc.includes("ungasan") || loc.includes("bingin") || loc.includes("nyanyi")) return "South Bali";
    if (loc.includes("selemadeg")) return "_OTHER_BALI";
    if (loc.includes("munduk")) return "North Bali";
    if (loc.includes("badung")) return "_OTHER_BALI";
    if (loc.includes("bali")) return "_OTHER_BALI";
    return "_OTHER_BALI";
  }
  // Fall back to name prefix for IBUKU compounds
  const name = p.name;
  if (name.startsWith("GS.") || name.startsWith("GS,")) return "GS.";
  if (name.startsWith("GV.") || name.startsWith("GV,") || name.startsWith("GV ")) return "GV.";
  if (name.startsWith("BI.")) return "BI.";
  if (name.startsWith("GC.")) return "GC.";
  if (name.startsWith("PTBP")) return "PTBP";
  const intl = ["RESTAURANT_SAO TOME","MALDIVE BEACH BAR","SUMBA HOSPITALITY FOUNDATION",
    "NAARA BOCAS DEL TORO PANAMA TREE HOUSE","MALOKA TIERRAMOR","KAWAY'AN ECO FARM",
    "DHARMA SHANTI 4 SEASON","AREA 15"];
  if (intl.includes(name)) return "_INTERNATIONAL";
  return "_OTHER_BALI";
}

function classShortLabel(cls) {
  return STRUCTURE_CATEGORIES.find(c => c.key === cls)?.label || cls;
}
function catColor(cls) {
  return STRUCTURE_CATEGORIES.find(c => c.key === cls)?.color || "#888";
}

/* ─── PROJECT CARD ─── */
function ProjectCard({ project, isHighlighted, onHover, onLeave, onClick }) {
  const accent = catColor(project.classification);
  return (
    <div onMouseEnter={onHover} onMouseLeave={onLeave} onClick={onClick}
      style={{
        background: isHighlighted ? C.bgCard : "transparent",
        border: `1px solid ${isHighlighted ? C.border : "transparent"}`,
        borderLeft: `3px solid ${isHighlighted ? accent : C.border}`,
        borderRadius: 10, padding: "6px 12px", cursor: "pointer",
        transition: "all 0.3s cubic-bezier(0.4,0,0.2,1)",
        transform: isHighlighted ? "translateX(4px)" : "translateX(0)",
        boxShadow: isHighlighted ? "0 2px 12px rgba(0,0,0,0.06)" : "none",
        minWidth: 0,
      }}>
      <div style={{ fontSize: 12, fontWeight: 500, color: isHighlighted ? C.textDark : C.textMid,
        letterSpacing: "0.04em", lineHeight: 1.4, whiteSpace: "nowrap", overflow: "hidden",
        textOverflow: "ellipsis", fontFamily: "'DM Sans', sans-serif" }}>
        {project.name}
      </div>
      <div style={{ fontSize: 9, color: isHighlighted ? accent : C.textMuted, marginTop: 1,
        letterSpacing: "0.08em", textTransform: "uppercase" }}>
        {classShortLabel(project.classification)} · {project.year}
      </div>
    </div>
  );
}

/* ─── MODAL ─── */
function ProjectDetail({ project, onClose }) {
  const [animIn, setAnimIn] = useState(false);
  useEffect(() => { requestAnimationFrame(() => requestAnimationFrame(() => setAnimIn(true))); }, []);
  if (!project) return null;
  const accent = catColor(project.classification);
  const loc = LOCATIONS[getProjectLocation(project)];
  const handleClose = () => { setAnimIn(false); setTimeout(onClose, 280); };

  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
      background: animIn ? "rgba(59,52,37,0.45)" : "rgba(59,52,37,0)", zIndex: 1000,
      display: "flex", alignItems: "center", justifyContent: "center",
      backdropFilter: animIn ? "blur(6px)" : "blur(0px)",
      transition: "background 0.3s ease, backdrop-filter 0.3s ease",
    }} onClick={handleClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: C.bgCard, borderRadius: 14, padding: "44px 48px", maxWidth: 440, width: "90%",
        boxShadow: "0 32px 80px rgba(59,52,37,0.2)", position: "relative",
        borderLeft: `4px solid ${accent}`,
        opacity: animIn ? 1 : 0,
        transform: animIn ? "translateY(0) scale(1)" : "translateY(24px) scale(0.96)",
        transition: "opacity 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.35s cubic-bezier(0.4,0,0.2,1)",
      }}>
        <button onClick={handleClose} style={{ position: "absolute", top: 16, right: 20,
          background: "none", border: "none", fontSize: 20, cursor: "pointer", color: C.textMuted }}>×</button>
        <div style={{ fontSize: 11, color: C.gold, fontWeight: 500, letterSpacing: "0.18em",
          textTransform: "uppercase", marginBottom: 12 }}>{project.year}</div>
        <h2 style={{ fontFamily: "'Cormorant Garamond', Georgia, serif", fontSize: 30, fontWeight: 400,

        <div style={{ borderLeft: `3px solid ${accent}`, paddingLeft: 14, fontSize: 13,

        </div>}
      </div>
    </div>
  );
}

/* ─── TIMELINE SCRUBBER ─── */
const NUMERIC_YEARS = YEARS.filter(y => /^\d{4}$/.test(y)).map(Number);
const MIN_YEAR = Math.min(...NUMERIC_YEARS);
const MAX_YEAR = Math.max(...NUMERIC_YEARS);

function TimelineScrubber({ currentYear, onChange, projectsByYear }) {
  const trackRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const [isPlaying, setIsPlaying] = useState(false);
  const playRef = useRef(null);

  const yearToPercent = (y) => ((y - MIN_YEAR) / (MAX_YEAR - MIN_YEAR)) * 100;
  const percentToYear = (pct) => Math.round(MIN_YEAR + (pct / 100) * (MAX_YEAR - MIN_YEAR));

  const updateFromMouse = (clientX) => {
    if (!trackRef.current) return;
    const rect = trackRef.current.getBoundingClientRect();
    const pct = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
    onChange(percentToYear(pct));
  };

  useEffect(() => {
    if (!dragging) return;
    const move = (e) => { e.preventDefault(); updateFromMouse(e.clientX || e.touches?.[0]?.clientX); };
    const up = () => setDragging(false);
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    window.addEventListener("touchmove", move, { passive: false });
    window.addEventListener("touchend", up);
    return () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up);
      window.removeEventListener("touchmove", move); window.removeEventListener("touchend", up); };
  }, [dragging]);

  // Auto-play
  useEffect(() => {
    if (!isPlaying) { clearInterval(playRef.current); return; }
    playRef.current = setInterval(() => {
      onChange(prev => {
        const next = prev + 1;
        if (next > MAX_YEAR) { setIsPlaying(false); return MAX_YEAR; }
        return next;
      });
    }, 600);
    return () => clearInterval(playRef.current);
  }, [isPlaying]);

  const pct = yearToPercent(currentYear);

  // Count projects per year for the timeline dots
  const maxCount = Math.max(...NUMERIC_YEARS.map(y => projectsByYear[y]?.length || 0), 1);

  return (
    <div style={{ padding: "0 0 8px" }}>
      {/* Year label + play */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <button onClick={() => { if (currentYear >= MAX_YEAR) onChange(MIN_YEAR); setIsPlaying(!isPlaying); }}
          style={{
            width: 36, height: 36, borderRadius: 18, border: `1px solid ${C.border}`,
            background: isPlaying ? C.gold : C.bgCard, color: isPlaying ? "#fff" : C.gold,
            fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 0.25s", fontFamily: "sans-serif",
          }}>
          {isPlaying ? "❚❚" : "▶"}
        </button>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontFamily: "'Cormorant Garamond', Georgia, serif",
            fontSize: 36, fontWeight: 300, color: C.textDark, lineHeight: 1 }}>
            {currentYear}
          </div>
          <div style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.1em", marginTop: 2 }}>
            {projectsByYear[currentYear]?.length || 0} new · {PROJECTS.filter(p => {
              const py = parseInt(p.year); return !isNaN(py) && py <= currentYear;
            }).length} total
          </div>
        </div>
        <div style={{ width: 36 }} /> {/* spacer */}
      </div>

      {/* Track */}
      <div ref={trackRef}
        onMouseDown={(e) => { setDragging(true); updateFromMouse(e.clientX); }}
        onTouchStart={(e) => { setDragging(true); updateFromMouse(e.touches[0].clientX); }}
        style={{
          position: "relative", height: 48, cursor: "pointer",
          userSelect: "none", touchAction: "none",
        }}>
        {/* Bar background */}
        <div style={{ position: "absolute", top: 20, left: 0, right: 0, height: 6,
          background: C.borderLight, borderRadius: 3 }} />
        {/* Filled portion */}
        <div style={{ position: "absolute", top: 20, left: 0, width: `${pct}%`, height: 6,
          background: `linear-gradient(90deg, ${C.gold}, ${C.goldLight})`, borderRadius: 3,
          transition: dragging ? "none" : "width 0.3s ease" }} />

        {/* Year ticks + mini bars */}
        {NUMERIC_YEARS.map(y => {
          const x = yearToPercent(y);
          const count = projectsByYear[y]?.length || 0;
          const barH = Math.max(2, (count / maxCount) * 16);
          const isPast = y <= currentYear;
          return (
            <div key={y} style={{
              position: "absolute", left: `${x}%`, transform: "translateX(-50%)",
              display: "flex", flexDirection: "column", alignItems: "center",
            }}>
              {/* Mini project count bar */}
              <div style={{
                width: 4, height: barH, borderRadius: 2, marginBottom: 2,
                background: isPast ? C.gold : C.border,
                opacity: isPast ? 0.7 : 0.3,
                transition: "background 0.3s, opacity 0.3s, height 0.3s",
              }} />
              {/* Tick */}
              <div style={{
                width: 2, height: 6,
                background: isPast ? C.gold : C.border,
                opacity: isPast ? 0.5 : 0.25,
                transition: "background 0.3s, opacity 0.3s",
              }} />
              {/* Year label (every 5 years) */}
              {(y % 5 === 0 || y === MIN_YEAR || y === MAX_YEAR) && (
                <div style={{
                  fontSize: 8, color: isPast ? C.textMid : C.textMuted,
                  marginTop: 3, letterSpacing: "0.05em",
                  fontWeight: y === currentYear ? 700 : 400,
                  transition: "color 0.3s",
                }}>{y}</div>
              )}
            </div>
          );
        })}

        {/* Draggable handle */}
        <div style={{
          position: "absolute", top: 12, left: `${pct}%`,
          transform: "translateX(-50%)",
          width: 20, height: 20, borderRadius: 10,
          background: C.gold, border: "3px solid #fff",
          boxShadow: `0 2px 8px rgba(0,0,0,0.2), 0 0 0 ${dragging ? "6px" : "0px"} ${C.gold}30`,
          cursor: "grab",
          transition: dragging ? "box-shadow 0.15s" : "left 0.3s ease, box-shadow 0.15s",
          zIndex: 5,
        }} />
      </div>
    </div>
  );
}

/* ─── VIEW 4: BALI MAP (with timeline + filters) ─── */
function MapView({ onSelect }) {
  const [selectedLoc, setSelectedLoc] = useState(null);
  const [hoveredIdx, setHoveredIdx] = useState(null);
  const [currentYear, setCurrentYear] = useState(MAX_YEAR);
  const [filterStructure, setFilterStructure] = useState("all");
  const [filterDesigner, setFilterDesigner] = useState("all");

  const structureOptions = [{ value: "all", label: "All Structures" },
    ...STRUCTURE_CATEGORIES.map(c => ({ value: c.key, label: c.label }))];
  const designerOptions = [{ value: "all", label: "All Designers" },
    ...DESIGNERS.map(d => ({ value: d, label: d }))];

  // Projects up to currentYear with filters
  const filtered = PROJECTS.filter(p => {
    const py = parseInt(p.year);
    if (isNaN(py) || py > currentYear) return false;
    if (filterStructure !== "all" && p.classification !== filterStructure) return false;
    if (filterDesigner !== "all" && p.designer !== filterDesigner) return false;
    return true;
  });

  // Projects added in exactly currentYear (for highlighting)
  const newThisYear = filtered.filter(p => parseInt(p.year) === currentYear);

  // Projects by year for scrubber mini-bars
  const projectsByYear = {};
  PROJECTS.forEach(p => {
    const py = parseInt(p.year);
    if (!isNaN(py)) { if (!projectsByYear[py]) projectsByYear[py] = []; projectsByYear[py].push(p); }
  });

  const activeFilters = (filterStructure !== "all" ? 1 : 0) + (filterDesigner !== "all" ? 1 : 0);

  // Group by location
  const locGroups = {};
  filtered.forEach(p => {
    const key = getProjectLocation(p);
    if (!locGroups[key]) locGroups[key] = [];
    locGroups[key].push(p);
  });

  const mapW = 680, mapH = 520;
  // Coordinate system matching Bali regency SVG
  const minLon = 114.35, maxLon = 115.85, minLat = -8.85, maxLat = -8.03;
  function toXY(lat, lng) {
    return {
      x: (lng - minLon) / (maxLon - minLon) * mapW,
      y: (lat - maxLat) / (minLat - maxLat) * mapH
    };
  }

  const clearFilters = () => { setFilterStructure("all"); setFilterDesigner("all"); };

  return (
    <div style={{ padding: "0 32px 48px", maxWidth: 1100, margin: "0 auto" }}>
      {/* Timeline scrubber */}
      <div style={{
        marginBottom: 20, padding: "20px 24px 12px",
        background: C.bgWarm, borderRadius: 12, border: `1px solid ${C.borderLight}`,
      }}>
        <TimelineScrubber currentYear={currentYear} onChange={setCurrentYear} projectsByYear={projectsByYear} />
      </div>

      {/* Structure + Designer filters */}
      <div style={{
        display: "flex", flexWrap: "wrap", gap: 14, alignItems: "flex-end",
        marginBottom: 20, padding: "12px 20px",
        background: C.bgWarm, borderRadius: 12, border: `1px solid ${C.borderLight}`,
      }}>
        <FilterSelect label="Structure" value={filterStructure} options={structureOptions} onChange={setFilterStructure} />
        <FilterSelect label="Designer" value={filterDesigner} options={designerOptions} onChange={setFilterDesigner} />
        <div style={{ display: "flex", alignItems: "center", gap: 12, paddingBottom: 2 }}>
          <div style={{ fontSize: 12, color: C.gold, fontWeight: 600 }}>
            {filtered.length} project{filtered.length !== 1 ? "s" : ""} by {currentYear}
          </div>
          {activeFilters > 0 && (
            <button onClick={clearFilters} style={{
              padding: "6px 14px", borderRadius: 20, border: `1px solid ${C.border}`,
              background: "transparent", color: C.textMid, fontSize: 11,
              cursor: "pointer", fontFamily: "'DM Sans', sans-serif", transition: "all 0.2s",
            }}
              onMouseEnter={e => { e.target.style.background = C.bgCard; e.target.style.borderColor = C.gold; }}
              onMouseLeave={e => { e.target.style.background = "transparent"; e.target.style.borderColor = C.border; }}
            >Clear</button>
          )}
        </div>
      </div>

      <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
        {/* Map */}
        <div style={{ flex: "1 1 420px", minWidth: 340 }}>
          <div style={{
            position: "relative", width: "100%", paddingBottom: `${(mapH/mapW)*100}%`,
            background: `linear-gradient(135deg, #d4cbb8 0%, #c8bfa8 50%, #beb5a0 100%)`,
            borderRadius: 12, overflow: "hidden", border: `1px solid ${C.border}`,
          }}>
            <svg viewBox={`0 0 ${mapW} ${mapH}`} style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%" }}>
              {/* Water background */}
              <rect width={mapW} height={mapH} fill="#c0d4d8" opacity="0.25" />
              {/* Bali regencies */}
              {BALI_REGENCIES.map(reg => (
                <g key={reg.name}>
                  <path d={reg.path} fill="#e8e0d0" stroke={C.border} strokeWidth="1" />
                  <path d={reg.path} fill="none" stroke="#fff" strokeWidth="0.5" opacity="0.6" />
                </g>
              ))}
              {/* Regency labels (small) */}
              {BALI_REGENCIES.map(reg => {
                // Approximate center of each regency for label
                const pts = reg.path.match(/[\d.]+/g).map(Number);
                let cx = 0, cy = 0, n = 0;
                for (let i = 0; i < pts.length; i += 2) { cx += pts[i]; cy += pts[i+1]; n++; }
                cx /= n; cy /= n;
                return (
                  <text key={reg.name} x={cx} y={cy} textAnchor="middle" dominantBaseline="central"
                    style={{ fontSize: 8, fill: C.textMuted, fontFamily: "'DM Sans', sans-serif",
                      letterSpacing: "0.08em", textTransform: "uppercase", opacity: 0.5 }}>
                    {reg.name}
                  </text>
                );
              })}

              {Object.entries(LOCATIONS).map(([key, loc]) => {
                if (!loc.lat) return null;
                const pos = toXY(loc.lat, loc.lng);
                const count = locGroups[key]?.length || 0;
                const newCount = newThisYear.filter(p => getProjectLocation(p) === key).length;
                const isSelected = selectedLoc === key;
                const isEmpty = count === 0;
                const r = isEmpty ? 8 : Math.max(14, Math.min(30, 10 + count * 0.8));
                return (
                  <g key={key} onClick={() => !isEmpty && setSelectedLoc(isSelected ? null : key)}
                    style={{ cursor: isEmpty ? "default" : "pointer" }}>
                    {/* Pulse ring for new projects */}
                    {newCount > 0 && !isEmpty && (
                      <circle cx={pos.x} cy={pos.y} r={r + 10}
                        fill="none" stroke={C.gold} strokeWidth="2" opacity="0.4">
                        <animate attributeName="r" from={r + 4} to={r + 18} dur="1.5s" repeatCount="indefinite" />
                        <animate attributeName="opacity" from="0.5" to="0" dur="1.5s" repeatCount="indefinite" />
                      </circle>
                    )}
                    <circle cx={pos.x} cy={pos.y} r={r + 4}
                      fill={isSelected ? `${C.gold}30` : "transparent"}
                      stroke={isSelected ? C.gold : "transparent"} strokeWidth="1.5"
                      style={{ transition: "all 0.4s" }} />
                    <circle cx={pos.x} cy={pos.y} r={r}
                      fill={isSelected ? C.bgDark : isEmpty ? `${C.textMuted}40` : C.gold}
                      stroke="#fff" strokeWidth={isEmpty ? 1 : 2}
                      style={{ transition: "all 0.4s ease", filter: isEmpty ? "none" : "drop-shadow(0 2px 4px rgba(0,0,0,0.2))" }} />
                    {!isEmpty && <text x={pos.x} y={pos.y + 1} textAnchor="middle" dominantBaseline="central"
                      style={{ fontSize: 11, fill: isSelected ? C.gold : "#fff", fontWeight: 700,
                        fontFamily: "'DM Sans', sans-serif", transition: "all 0.3s" }}>{count}</text>}
                    <text x={pos.x} y={pos.y + r + 14} textAnchor="middle"
                      style={{ fontSize: 10, fill: isEmpty ? C.textMuted : C.textDark, fontWeight: 600,
                        fontFamily: "'DM Sans', sans-serif", letterSpacing: "0.05em",
                        opacity: isEmpty ? 0.4 : 1, transition: "all 0.3s" }}>{loc.name}</text>
                  </g>
                );
              })}
            </svg>
          </div>
          {/* International row */}
          {(() => {
            const intlCount = locGroups["_INTERNATIONAL"]?.length || 0;
            return (
              <div style={{ marginTop: 16, padding: "12px 16px", background: C.bgWarm, borderRadius: 10,
                border: `1px solid ${C.borderLight}`, opacity: intlCount > 0 ? 1 : 0.35, transition: "opacity 0.3s" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", cursor: intlCount ? "pointer" : "default" }}
                  onClick={() => intlCount > 0 && setSelectedLoc(selectedLoc === "_INTERNATIONAL" ? null : "_INTERNATIONAL")}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: C.textDark }}>International Projects</span>
                  <span style={{ fontSize: 12, color: C.gold, fontWeight: 600 }}>{intlCount} projects</span>
                </div>
              </div>
            );
          })()}
        </div>

        {/* Side panel */}
        <div style={{ flex: "1 1 280px", minWidth: 260 }}>
          {selectedLoc && (locGroups[selectedLoc]?.length || 0) > 0 ? (
            <div>
              <div style={{ marginBottom: 16 }}>
                <h3 style={{ fontFamily: "'Cormorant Garamond', Georgia, serif",
                  fontSize: 24, fontWeight: 400, color: C.textDark, margin: "0 0 4px" }}>
                  {LOCATIONS[selectedLoc]?.name || "Projects"}
                </h3>
                <div style={{ fontSize: 12, color: C.textMuted }}>{LOCATIONS[selectedLoc]?.desc}</div>
                <div style={{ fontSize: 12, color: C.gold, fontWeight: 600, marginTop: 4 }}>
                  {locGroups[selectedLoc].length} project{locGroups[selectedLoc].length !== 1 ? "s" : ""} by {currentYear}
                  {activeFilters > 0 && <span style={{ color: C.textMuted, fontWeight: 400 }}> (filtered)</span>}
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4, maxHeight: 440, overflowY: "auto" }}>
                {(locGroups[selectedLoc] || []).sort((a,b) => (a.year > b.year ? 1 : -1)).map(p => {
                  const i = PROJECTS.indexOf(p);
                  const isNew = parseInt(p.year) === currentYear;
                  return (
                    <div key={i} style={{
                      position: "relative",
                      borderLeft: isNew ? `3px solid ${C.gold}` : "none",
                      paddingLeft: isNew ? 0 : 3,
                    }}>
                      <ProjectCard project={p} isHighlighted={hoveredIdx===i}
                        onHover={()=>setHoveredIdx(i)} onLeave={()=>setHoveredIdx(null)} onClick={()=>onSelect(p)} />
                      {isNew && <div style={{
                        position: "absolute", top: 4, right: 8,
                        fontSize: 8, color: C.gold, fontWeight: 700,
                        letterSpacing: "0.1em", textTransform: "uppercase",
                      }}>NEW</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          ) : (
            <div style={{ textAlign: "center", paddingTop: 60 }}>
              <div style={{ fontFamily: "'Cormorant Garamond', Georgia, serif",
                fontSize: 20, color: C.textMuted, fontStyle: "italic" }}>
                {filtered.length === 0 ? "No projects yet" : "Select a location"}
              </div>
              <div style={{ fontSize: 12, color: C.textMuted, marginTop: 8 }}>
                {filtered.length === 0
                  ? `Drag the timeline past ${MIN_YEAR} to see projects appear`
                  : "Click a marker to explore projects at that compound"}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── ANIMATED VIEW ─── */
function AnimatedView({ isVisible, direction, children }) {
  const [shouldRender, setShouldRender] = useState(isVisible);
  const [animState, setAnimState] = useState(isVisible ? "entered" : "exited");
  useEffect(() => {
    if (isVisible) {
      setShouldRender(true);
      requestAnimationFrame(() => { requestAnimationFrame(() => setAnimState("entering")); });
      const t = setTimeout(() => setAnimState("entered"), 500);
      return () => clearTimeout(t);
    } else {
      setAnimState("exiting");
      const t = setTimeout(() => { setAnimState("exited"); setShouldRender(false); }, 400);
      return () => clearTimeout(t);
    }
  }, [isVisible]);
  if (!shouldRender) return null;
  const s = direction === "left" ? -40 : 40;
  const st = {
    entering: { opacity: 1, transform: "translateX(0)", filter: "blur(0px)" },
    entered: { opacity: 1, transform: "translateX(0)", filter: "blur(0px)" },
    exiting: { opacity: 0, transform: `translateX(${-s}px)`, filter: "blur(3px)" },
    exited: { opacity: 0, transform: `translateX(${s}px)`, filter: "blur(3px)" },
  };
  return <div style={{ transition: "opacity 0.4s cubic-bezier(0.4,0,0.2,1), transform 0.45s cubic-bezier(0.4,0,0.2,1), filter 0.35s ease",
    willChange: "opacity, transform, filter", ...st[animState] }}>{children}</div>;
}

                    onBlur={e => e.target.style.borderColor = C.border} />
                </div>

                {/* Email */}
                <div>

                    textTransform: "uppercase", display: "block", marginBottom: 4 }}>Email</label>

                {/* Type */}

                    onBlur={e => e.target.style.borderColor = C.border}>
                    <option value="correction">Data Correction</option>
                    <option value="new_project">New Project</option>

                <div>

                  <input style={inputStyle} value={formData.project}

                    onFocus={e => e.target.style.borderColor = C.gold}

                {/* Message */}
                <div>
                  <label style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.1em",
                    textTransform: "uppercase", display: "block", marginBottom: 4 }}>Details *</label>
                  <textarea style={{...inputStyle, minHeight: 100, resize: "vertical", lineHeight: 1.5}}
                    value={formData.message}

                    placeholder="Describe the correction, addition, or information you'd like to share..."

                    onBlur={e => e.target.style.borderColor = C.border} />

                {/* Submit */}

  heroHeadline: "",
  heroSubtitle: "",
  heroBody: "",
  sectionTitle: "",
  sectionSubtitle: "",
  milestones: [
    { year: "2005", title: "", text: "" },
    { year: "2008", title: "", text: "" },
    { year: "2011", title: "", text: "" },
    { year: "2013", title: "", text: "" },
    { year: "2018", title: "", text: "" },
    { year: "2025", title: "", text: "" },
  ],
  ctaText: "",
  ctaTagline: "",
};

function LandingPage({ onEnter }) {
  const [editing, setEditing] = useState(false);
  const [content, setContent] = useState(DEFAULT_CONTENT);
  const [loaded, setLoaded] = useState(false);
  const [saved, setSaved] = useState(false);
  const [scrollY, setScrollY] = useState(0);
  const containerRef = useRef(null);

  // Load from storage
  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get("landing-content");
        if (result && result.value) {
          const parsed = JSON.parse(result.value);
          setContent({ ...DEFAULT_CONTENT, ...parsed });
        }
      } catch (e) { /* no saved content yet */ }
      setLoaded(true);
    })();
  }, []);

  // Save to storage
  const handleSave = async () => {
    try {
      await window.storage.set("landing-content", JSON.stringify(content));
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
      setEditing(false);
    } catch (e) { console.error("Save failed", e); }
  };

  // Scroll tracking
  useEffect(() => {
    const handle = () => setScrollY(window.scrollY || document.documentElement.scrollTop);
    window.addEventListener("scroll", handle, { passive: true });
    return () => window.removeEventListener("scroll", handle);
  }, []);

  const updateField = (field, value) => setContent(c => ({ ...c, [field]: value }));
  const updateMilestone = (i, field, value) => {
    setContent(c => {
      const ms = [...c.milestones];
      ms[i] = { ...ms[i], [field]: value };
      return { ...c, milestones: ms };
    });
  };
  const addMilestone = () => {
    setContent(c => ({ ...c, milestones: [...c.milestones, { year: "", title: "", text: "" }] }));
  };
  const removeMilestone = (i) => {
    setContent(c => ({ ...c, milestones: c.milestones.filter((_, idx) => idx !== i) }));

  const placeholder = (text) => <span style={{ color: C.textMuted, opacity: 0.4, fontStyle: "italic" }}>{text}</span>;

    if (!editing) {
      return <span style={fieldStyle}>{value || placeholder(placeholderText)}</span>;
    }
    if (multiline) {
      return <textarea value={value} onChange={e => onChange(e.target.value)}
        placeholder={placeholderText}
        style={{
          ...fieldStyle, background: `${C.gold}08`, border: `1px solid ${C.gold}30`,
          borderRadius: 8, padding: "8px 12px", outline: "none", resize: "vertical",

        ...fieldStyle, background: `${C.gold}08`, border: `1px solid ${C.gold}30`,
        borderRadius: 8, padding: "6px 12px", outline: "none",
        width: "100%", boxSizing: "border-box",
        fontFamily: fieldStyle?.fontFamily || "'DM Sans', sans-serif",
        transition: "border-color 0.2s",

      onBlur={e => e.target.style.borderColor = `${C.gold}30`}

        position: "fixed", bottom: 24, right: 24, zIndex: 200,

        {editing ? (
          <>
            <button onClick={() => setEditing(false)} style={{
              padding: "10px 20px", borderRadius: 10, border: `1px solid ${C.border}`,
              background: C.bgCard, color: C.textMid, fontSize: 12, fontWeight: 600,

/* ─── PAGE TRANSITION ─── */
function PageTransition({ pageKey, children }) {
  const [displayKey, setDisplayKey] = useState(pageKey);
  const [animState, setAnimState] = useState("visible");
  const [content, setContent] = useState(children);

  useEffect(() => {
    if (pageKey !== displayKey) {
      // Fade out current
      setAnimState("exiting");
      setTimeout(() => {
        setContent(children);
        setDisplayKey(pageKey);
        window.scrollTo({ top: 0, behavior: "instant" });
        setAnimState("entering");
        requestAnimationFrame(() => {
          requestAnimationFrame(() => setAnimState("visible"));
        });
      }, 350);
    } else {
      setContent(children);
    }
  }, [pageKey, children]);

  const styles = {
    visible: { opacity: 1, transform: "translateY(0)", filter: "blur(0px)", transition: "opacity 0.45s cubic-bezier(0.4,0,0.2,1), transform 0.5s cubic-bezier(0.4,0,0.2,1), filter 0.35s ease" },
    exiting: { opacity: 0, transform: "translateY(-20px)", filter: "blur(6px)", transition: "opacity 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.35s cubic-bezier(0.4,0,0.2,1), filter 0.3s ease" },
    entering: { opacity: 0, transform: "translateY(24px)", filter: "blur(6px)", transition: "none" },
  };

  return (
    <div style={{ willChange: "opacity, transform, filter", ...styles[animState] }}>
      {content}
    </div>
  );
}

/* ─── SEARCH BAR ─── */
function GlobalSearch({ onSelect }) {
  const [query, setQuery] = useState("");
  const [focused, setFocused] = useState(false);
  const inputRef = useRef(null);

  // Keyboard shortcut: Cmd+K or Ctrl+K
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        inputRef.current?.focus();
      }
      if (e.key === "Escape") {
        setQuery("");
        inputRef.current?.blur();
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const q = query.trim().toLowerCase();
  const results = q.length < 2 ? [] : PROJECTS.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.year.toLowerCase().includes(q) ||
    p.classification.toLowerCase().includes(q) ||
    p.designer.toLowerCase().includes(q) ||
    (p.location || "").toLowerCase().includes(q)
  ).slice(0, 8);

  const showDropdown = focused && q.length >= 2;

  return (
    <div style={{ position: "relative", width: 280 }}>
      {/* Input */}
      <div style={{
        display: "flex", alignItems: "center", gap: 8,
        background: focused ? C.bgCard : `${C.bgCard}99`,
        border: `1px solid ${focused ? C.gold : C.border}`,
        borderRadius: 10, padding: "7px 12px",
        transition: "all 0.2s",
        boxShadow: focused ? `0 0 0 3px ${C.gold}22` : "none",
      }}>
        <span style={{ fontSize: 14, color: focused ? C.gold : C.textMuted, flexShrink: 0 }}>⌕</span>
        <input
          ref={inputRef}
          value={query}
          onChange={e => setQuery(e.target.value)}
          onFocus={() => setFocused(true)}
          onBlur={() => setTimeout(() => setFocused(false), 180)}
          placeholder="Search projects…"
          style={{
            background: "none", border: "none", outline: "none",
            fontSize: 12, color: C.textDark, width: "100%",
            fontFamily: "'DM Sans', sans-serif",
            "::placeholder": { color: C.textMuted },
          }}
        />
        {query ? (
          <button onClick={() => setQuery("")} style={{
            background: "none", border: "none", cursor: "pointer",
            color: C.textMuted, fontSize: 16, lineHeight: 1, padding: 0, flexShrink: 0,
          }}>×</button>
        ) : (
          <span style={{
            fontSize: 9, color: C.textMuted, letterSpacing: "0.06em",
            background: C.bgWarm, border: `1px solid ${C.border}`,
            borderRadius: 4, padding: "2px 5px", flexShrink: 0, whiteSpace: "nowrap",
          }}>⌘K</span>
        )}
      </div>

      {/* Dropdown results */}
      {showDropdown && (
        <div style={{
          position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0,
          background: C.bgCard, border: `1px solid ${C.border}`,
          borderRadius: 12, boxShadow: "0 12px 40px rgba(59,52,37,0.16)",
          zIndex: 999, overflow: "hidden",
        }}>
          {results.length === 0 ? (
            <div style={{ padding: "16px 18px", fontSize: 12, color: C.textMuted,
              fontStyle: "italic", textAlign: "center" }}>
              No projects found
            </div>
          ) : results.map((p, i) => {
            const accent = catColor(p.classification);
            const hi = (txt) => {
              if (!q) return txt;
              const idx = txt.toLowerCase().indexOf(q);
              if (idx === -1) return txt;
              return <>
                {txt.slice(0, idx)}
                <mark style={{ background: `${C.gold}44`, color: C.textDark, borderRadius: 2, padding: "0 1px" }}>
                  {txt.slice(idx, idx + q.length)}
                </mark>
                {txt.slice(idx + q.length)}
              </>;
            };
            return (
              <div key={i}
                onMouseDown={() => { onSelect(p); setQuery(""); }}
                style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "10px 14px", cursor: "pointer",
                  borderBottom: i < results.length - 1 ? `1px solid ${C.borderLight}` : "none",
                  transition: "background 0.15s",
                }}
                onMouseEnter={e => e.currentTarget.style.background = C.bgWarm}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}
              >
                <div style={{ width: 3, alignSelf: "stretch", borderRadius: 2, background: accent, flexShrink: 0 }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 500, color: C.textDark,
                    whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {hi(p.name)}
                  </div>
                  <div style={{ fontSize: 10, color: C.textMuted, marginTop: 1 }}>
                    {hi(p.year)} · {hi(classShortLabel(p.classification))} · {hi(p.designer)}
                  </div>
                </div>
              </div>
            );
          })}
          {results.length > 0 && (
            <div style={{ padding: "7px 14px", fontSize: 10, color: C.textMuted,
              borderTop: `1px solid ${C.borderLight}`, letterSpacing: "0.08em" }}>
              {results.length} result{results.length !== 1 ? "s" : ""} · press Esc to close
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── APP ─── */
function App() {
  const [page, setPage] = useState("landing");
  const [view, setView] = useState("map");
  const [selectedProject, setSelectedProject] = useState(null);
  const [viewKey, setViewKey] = useState(0);

  const handleViewChange = (v) => { if (v !== view) { setView(v); setViewKey(k => k + 1); } };

  const dirMap = { map: 0, roadmap: 1, structure: 2, designer: 3 };
  const getDir = (v) => dirMap[v] < dirMap[view] ? "left" : "right";

  const pageContent = page === "landing" ? (
    <LandingPage onEnter={() => setPage("docs")} />
  ) : page === "docs" ? (
    <>
      <div style={{ textAlign: "center", padding: "52px 32px 12px" }}>
        <h1 style={{ fontFamily: "'Cormorant Garamond', Georgia, serif", fontSize: 48,
          fontWeight: 300, color: C.textDark, margin: 0, letterSpacing: "0.06em", lineHeight: 1 }}>
          BAMBOO BUILDING
        </h1>
        <p style={{ fontFamily: "'Cormorant Garamond', Georgia, serif", fontSize: 28,
          fontWeight: 300, fontStyle: "italic", color: C.gold, margin: "4px 0 0" }}>
          Classification & Roadmap
        </p>
        <div style={{ width: 50, height: 1,
          background: `linear-gradient(90deg, transparent, ${C.gold}, transparent)`,
          margin: "20px auto 0" }} />
      </div>

      <StatsBar />
      <ViewToggle view={view} setView={handleViewChange} />

      <div style={{ position: "relative", minHeight: 400 }}>
        <AnimatedView isVisible={view === "roadmap"} direction={getDir("roadmap")}>
          <RoadmapView key={`r-${viewKey}`} onSelect={setSelectedProject} />
        </AnimatedView>
        <AnimatedView isVisible={view === "structure"} direction={getDir("structure")}>
          <StructureView key={`s-${viewKey}`} onSelect={setSelectedProject} />
        </AnimatedView>
        <AnimatedView isVisible={view === "designer"} direction={getDir("designer")}>
          <DesignerView key={`d-${viewKey}`} onSelect={setSelectedProject} />
        </AnimatedView>
        <AnimatedView isVisible={view === "map"} direction={getDir("map")}>
          <MapView key={`m-${viewKey}`} onSelect={setSelectedProject} />
        </AnimatedView>
      </div>

      {selectedProject && <ProjectDetail project={selectedProject} onClose={() => setSelectedProject(null)} />}
    </>
  ) : (
    <div style={{ paddingTop: 48 }}>
      <ContributePage onBack={() => setPage("docs")} />
    </div>
  );

  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", background: C.bg,
      minHeight: "100vh", color: C.textDark, overflowX: "hidden" }}>
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

      {/* Top bar with navigation */}
      <div style={{ background: C.bgDark, padding: "0 32px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        position: "sticky", top: 0, zIndex: 100,
      }}>
        <button onClick={() => setPage("landing")} style={{
          fontSize: 16, fontWeight: 700, color: C.textOnDark, letterSpacing: "0.2em",
          background: "none", border: "none", cursor: "pointer", padding: "14px 0",
          fontFamily: "'DM Sans', sans-serif",
        }}>IBUKU</button>
        <div style={{ display: "flex", alignItems: "center", gap: 0 }}>
          {[
            { key: "landing", label: "Home" },
            { key: "docs", label: "Documentation" },
            { key: "contribute", label: "Contribute" },
          ].map(p => (
            <button key={p.key} onClick={() => setPage(p.key)}
              style={{
                padding: "16px 20px", border: "none", background: "transparent",
                color: page === p.key ? C.gold : `${C.textOnDark}88`,
                fontSize: 11, fontWeight: 600, cursor: "pointer",
                letterSpacing: "0.12em", textTransform: "uppercase",
                fontFamily: "'DM Sans', sans-serif",
                borderBottom: page === p.key ? `2px solid ${C.gold}` : "2px solid transparent",
                transition: "all 0.25s",
              }}>{p.label}</button>
          ))}
          <div style={{ marginLeft: 16 }}>
            <GlobalSearch onSelect={(p) => { setPage("docs"); setSelectedProject(p); }} />
          </div>
        </div>
      </div>

      <PageTransition pageKey={page}>
        {pageContent}
      </PageTransition>

      <div style={{ textAlign: "center", padding: "36px 32px", fontSize: 10, color: C.textMuted,
        borderTop: `1px solid ${C.borderLight}`, letterSpacing: "0.12em", textTransform: "uppercase" }}>
        IBUKU · {PROJECTS.length} Projects · 2005–Present
      </div>
    </div>
  );
}


    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
